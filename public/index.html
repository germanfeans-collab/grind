<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIND</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;--surface:#121216;--surface2:#1a1a20;--border:#252530;
  --accent:#e8ff47;--red:#ff3b3b;--orange:#ff6b35;
  --text:#f0f0f5;--muted:#6b6b80;--success:#3ddc84;--danger:#ff5555;--warning:#ffb547;
  --combat:#ff3b3b;--fitness:#3ddc84;--personal:#6b8cff;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* DEMO BANNER */
#demo-banner{background:#0f0f00;border-bottom:1px solid rgba(232,255,71,.2);padding:6px 20px;display:flex;align-items:center;justify-content:center;gap:14px;font-size:11.5px;color:rgba(232,255,71,.8);flex-shrink:0;}
.cred{background:rgba(232,255,71,.1);border:1px solid rgba(232,255,71,.25);border-radius:5px;padding:1px 8px;font-family:monospace;font-size:11px;}

/* LAYOUT */
#app{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.logo-text{font-family:'Bebas Neue';font-size:32px;color:var(--accent);letter-spacing:3px;line-height:1;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-section{padding:14px 18px 4px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(232,255,71,.05);}
.nav-item svg{width:15px;height:15px;flex-shrink:0;}
.sidebar-footer{padding:14px 18px;border-top:1px solid var(--border);}
.user-badge{display:flex;align-items:center;gap:8px;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:15px;color:#000;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:10px;color:var(--muted);}
.logout-btn{font-size:10px;cursor:pointer;color:var(--accent);margin-top:1px;}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{padding:0 24px;height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
#topbar h2{font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}
#content{flex:1;overflow-y:auto;padding:22px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
.stat-card.red::before{background:var(--danger);}
.stat-card.green::before{background:var(--success);}
.stat-card.orange::before{background:var(--warning);}
.stat-card.blue::before{background:var(--personal);}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.stat-value{font-family:'Bebas Neue';font-size:36px;line-height:1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* BUTTONS */
.btn{padding:7px 15px;border-radius:var(--r);border:none;cursor:pointer;font-family:'DM Sans';font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#d4eb3a;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:rgba(255,85,85,.12);color:var(--danger);border:1px solid rgba(255,85,85,.3);}
.btn-danger:hover{background:rgba(255,85,85,.22);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-combat{background:rgba(255,59,59,.15);color:var(--combat);border:1px solid rgba(255,59,59,.3);}
.btn-fitness{background:rgba(61,220,132,.12);color:var(--fitness);border:1px solid rgba(61,220,132,.3);}
.btn-personal{background:rgba(107,140,255,.12);color:var(--personal);border:1px solid rgba(107,140,255,.3);}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.table-header{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.table-header h3{font-size:13px;font-weight:600;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 13px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:10px 13px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.035);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;}
.badge-green{background:rgba(61,220,132,.15);color:var(--success);}
.badge-red{background:rgba(255,85,85,.15);color:var(--danger);}
.badge-yellow{background:rgba(255,181,71,.15);color:var(--warning);}
.badge-gray{background:rgba(107,107,128,.15);color:var(--muted);}
.badge-combat{background:rgba(255,59,59,.15);color:var(--combat);}
.badge-fitness{background:rgba(61,220,132,.12);color:var(--fitness);}
.badge-personal{background:rgba(107,140,255,.12);color:var(--personal);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:15px;font-weight:600;}
.modal-body{padding:20px;}
.modal-footer{padding:13px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group.full{grid-column:1/-1;}
label{font-size:11px;color:var(--muted);font-weight:500;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'DM Sans';font-size:13px;transition:border-color .15s;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:70px;}
select option{background:var(--surface2);}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:7px 12px;min-width:220px;}
.search-box input{background:none;border:none;padding:0;font-size:13px;flex:1;}

/* CHART */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:64px;}
.chart-bar{flex:1;background:var(--accent);border-radius:3px 3px 0 0;min-height:3px;opacity:.7;transition:opacity .2s;}
.chart-bar:hover{opacity:1;}
.chart-labels{display:flex;gap:4px;margin-top:3px;}
.chart-labels span{flex:1;text-align:center;font-size:9px;color:var(--muted);}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;transform:translateY(60px);opacity:0;transition:all .25s;max-width:300px;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.success{background:#0f2a1a;border:1px solid var(--success);color:var(--success);}
#toast.error{background:#2a0f0f;border:1px solid var(--danger);color:var(--danger);}

/* QR CARD */
.qr-card{background:#fff;border-radius:10px;padding:14px;text-align:center;width:180px;margin:0 auto;}
.qr-card img{width:150px;height:150px;}
.qr-card p{color:#222;font-size:11px;margin-top:6px;font-weight:700;}

/* ACCESOS */
.access-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--success);flex-shrink:0;}
.dot.warn{background:var(--warning);}

/* SCANNER */
.scanner-area{background:var(--surface2);border:2px dashed var(--border);border-radius:14px;padding:38px;text-align:center;cursor:pointer;transition:border-color .2s;}
.scanner-area:hover{border-color:var(--accent);}
.scan-result{padding:18px;border-radius:var(--r);text-align:center;margin-top:14px;}
.scan-result.ok{background:rgba(61,220,132,.08);border:1px solid rgba(61,220,132,.3);}
.scan-result.fail{background:rgba(255,85,85,.08);border:1px solid rgba(255,85,85,.3);}
.scan-result.warn{background:rgba(255,181,71,.08);border:1px solid rgba(255,181,71,.3);}

/* ── ALUMNO VIEWS ───────── */
.alumno-hero{background:linear-gradient(135deg,#0f1a0a,#0a0f1a);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;}
.alumno-avatar{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:26px;color:#000;flex-shrink:0;}
.alumno-estado{flex:1;}
.alumno-estado h2{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;}
.cuota-status{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:6px;}
.cuota-ok{background:rgba(61,220,132,.12);color:var(--success);border:1px solid rgba(61,220,132,.3);}
.cuota-venc{background:rgba(255,85,85,.12);color:var(--danger);border:1px solid rgba(255,85,85,.3);}

.clases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.clase-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s;position:relative;overflow:hidden;}
.clase-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.clase-card.COMBATE::before{background:var(--combat);}
.clase-card.FITNESS::before{background:var(--fitness);}
.clase-card.PERSONAL::before{background:var(--personal);}
.clase-card:hover{border-color:rgba(232,255,71,.3);}
.clase-cat{font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:6px;}
.clase-cat.COMBATE{color:var(--combat);}
.clase-cat.FITNESS{color:var(--fitness);}
.clase-cat.PERSONAL{color:var(--personal);}
.clase-nombre{font-family:'Bebas Neue';font-size:20px;letter-spacing:.5px;margin-bottom:4px;}
.clase-info{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
.clase-footer{display:flex;align-items:center;justify-content:space-between;}
.clase-spots{font-size:11px;color:var(--muted);}
.clase-spots.llena{color:var(--danger);}
.cat-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.cat-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans';font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.cat-btn.active,.cat-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.06);}
.cat-btn.COMBATE.active{border-color:var(--combat);color:var(--combat);background:rgba(255,59,59,.08);}
.cat-btn.FITNESS.active{border-color:var(--fitness);color:var(--fitness);background:rgba(61,220,132,.08);}
.cat-btn.PERSONAL.active{border-color:var(--personal);color:var(--personal);background:rgba(107,140,255,.08);}

/* MIS CLASES */
.mi-clase-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
.mi-clase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.mi-clase-dot.COMBATE{background:var(--combat);}
.mi-clase-dot.FITNESS{background:var(--fitness);}
.mi-clase-dot.PERSONAL{background:var(--personal);}

/* ADMIN CLASES */
.admin-clase-row{display:flex;align-items:center;gap:0;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.admin-clase-row:hover{background:rgba(255,255,255,.02);}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:0;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:340px;}
.login-logo{font-family:'Bebas Neue';font-size:52px;color:var(--accent);letter-spacing:4px;text-align:center;line-height:1;}
.login-tagline{text-align:center;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;margin-top:2px;}
.login-demo-hint{background:rgba(232,255,71,.07);border:1px solid rgba(232,255,71,.2);border-radius:8px;padding:10px 14px;font-size:11.5px;color:rgba(232,255,71,.8);margin-bottom:20px;line-height:1.6;}
</style>
</head>
<body>

<div id="demo-banner">
  <span>⚡ GRIND Demo</span>
  <span>Admin: <span class="cred">admin</span> / <span class="cred">grind2024</span></span>
  <span style="opacity:.4">·</span>
  <span>Alumno: <span class="cred">demo</span> / <span class="cred">demo</span></span>
</div>

<div id="app">
<aside id="sidebar">
  <div class="logo">
    <div class="logo-text">GRIND</div>
    <div class="logo-sub">Sistema de gestión</div>
  </div>
  <nav id="nav"></nav>
  <div class="sidebar-footer">
    <div class="user-badge">
      <div class="user-avatar" id="user-avatar">G</div>
      <div class="user-info">
        <div class="user-name" id="user-name">—</div>
        <div class="user-role" id="user-role">—</div>
        <div class="logout-btn" onclick="logout()">Cerrar sesión</div>
      </div>
    </div>
  </div>
</aside>

<main id="main">
  <div id="topbar">
    <h2 id="page-title">GRIND</h2>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div id="content">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</main>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">GRIND</div>
    <div class="login-tagline">Sistema de Gestión</div>
    <div class="login-demo-hint">
      👤 <strong>Admin:</strong> admin / grind2024<br>
      🏋️ <strong>Alumno demo:</strong> demo / demo
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label>Usuario</label>
      <input type="text" id="l-user" value="admin">
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label>Contraseña</label>
      <input type="password" id="l-pass" value="grind2024" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" onclick="doLogin()">Ingresar</button>
    <div id="l-err" style="color:var(--danger);font-size:12px;margin-top:10px;text-align:center;display:none"></div>
  </div>
</div>

<div id="toast"></div>
<div id="modals"></div>

<script>
// ═══════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════
async function api(method, path, data) {
  const r = await fetch('/api'+path, {
    method, headers:{'Content-Type':'application/json'},
    body: data ? JSON.stringify(data) : undefined
  });
  const json = await r.json();
  if (!r.ok) throw new Error(json.error||'Error');
  return json;
}

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
let currentUser = null;

async function doLogin() {
  try {
    const res = await api('POST','/auth/login',{username:document.getElementById('l-user').value, password:document.getElementById('l-pass').value});
    currentUser = res.user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('user-name').textContent = res.user.nombre;
    document.getElementById('user-avatar').textContent = res.user.nombre[0].toUpperCase();
    document.getElementById('user-role').textContent = res.user.rol === 'admin' ? 'Administrador' : 'Alumno';
    setupNav(res.user.rol);
    navigate(res.user.rol === 'admin' ? 'dashboard' : 'mis-clases');
  } catch(e) {
    const el = document.getElementById('l-err');
    el.textContent = e.message; el.style.display='block';
  }
}
async function logout() { await api('POST','/auth/logout'); location.reload(); }

// ═══════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════
function setupNav(rol) {
  const adminNav = `
    <div class="nav-section">Principal</div>
    <div class="nav-item" onclick="navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
    </div>
    <div class="nav-item" onclick="navigate('scanner')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10"/></svg>Lector QR
    </div>
    <div class="nav-section">Gestión</div>
    <div class="nav-item" onclick="navigate('socios')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Socios
    </div>
    <div class="nav-item" onclick="navigate('cobros')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>Cobros
    </div>
    <div class="nav-item" onclick="navigate('accesos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Accesos
    </div>
    <div class="nav-section">Clases & Config</div>
    <div class="nav-item" onclick="navigate('admin-clases')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>Clases
    </div>
    <div class="nav-item" onclick="navigate('planes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Planes
    </div>`;

  const alumnoNav = `
    <div class="nav-section">Mi espacio</div>
    <div class="nav-item" onclick="navigate('mis-clases')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Mis Clases
    </div>
    <div class="nav-item" onclick="navigate('explorar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explorar Clases
    </div>
    <div class="nav-item" onclick="navigate('mi-qr')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10"/></svg>Mi QR
    </div>`;

  document.getElementById('nav').innerHTML = rol === 'admin' ? adminNav : alumnoNav;
}

function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(`'${page}'`)));
  const titles = {dashboard:'Dashboard',socios:'Socios',cobros:'Cobros & Cuotas','admin-clases':'Gestión de Clases',planes:'Planes & Precios',accesos:'Historial de Accesos',scanner:'Lector QR','mis-clases':'Mis Clases',explorar:'Explorar Clases','mi-qr':'Mi QR'};
  document.getElementById('page-title').textContent = titles[page]||page;
  document.getElementById('topbar-actions').innerHTML = '';
  setContent('<div class="loading"><div class="spinner"></div></div>');
  const pages = {dashboard:renderDashboard,socios:renderSocios,cobros:renderCobros,'admin-clases':renderAdminClases,planes:renderPlanes,accesos:renderAccesos,scanner:renderScanner,'mis-clases':renderMisClases,explorar:renderExplorar,'mi-qr':renderMiQR};
  if (pages[page]) pages[page]();
}

function setContent(h) { document.getElementById('content').innerHTML = h; }
function setActions(h) { document.getElementById('topbar-actions').innerHTML = h; }

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  setTimeout(() => t.className='', 3200);
}
function openModal(title, body, footer='') {
  const id = 'modal-'+Date.now();
  document.getElementById('modals').insertAdjacentHTML('beforeend',`
  <div class="modal-overlay open" id="${id}" onclick="if(event.target.id==='${id}')closeModal('${id}')">
    <div class="modal">
      <div class="modal-header"><h3>${title}</h3><button class="btn btn-secondary btn-sm" onclick="closeModal('${id}')" style="padding:3px 9px">✕</button></div>
      <div class="modal-body">${body}</div>
      ${footer?`<div class="modal-footer">${footer}</div>`:''}
    </div>
  </div>`);
  return id;
}
function closeModal(id) { document.getElementById(id)?.remove(); }
function catBadge(cat) { return `<span class="badge badge-${cat.toLowerCase()}">${cat}</span>`; }
function hoy() { return new Date().toISOString().slice(0,10); }

async function renderDashboard() {
  const d = await api('GET','/dashboard');
  const maxB = Math.max(...d.accesosSemana.map(x=>x.cantidad),1);
  const bars = d.accesosSemana.map(x=>`<div class="chart-bar" style="height:${Math.max(4,(x.cantidad/maxB)*64)}px" title="${x.dia}: ${x.cantidad}"></div>`).join('');
  const labels = d.accesosSemana.map(x=>`<span>${x.dia.slice(5)}</span>`).join('');

  const catColors = {COMBATE:'var(--combat)',FITNESS:'var(--fitness)',PERSONAL:'var(--personal)'};
  const catBars = d.clasesPorCat.map(c=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <div style="width:80px;font-size:11px;font-weight:700;color:${catColors[c.categoria]||'var(--muted)'}">${c.categoria}</div>
      <div style="flex:1;height:18px;background:var(--surface2);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${c.n*20}%;background:${catColors[c.categoria]||'var(--accent)'};border-radius:4px;max-width:100%"></div>
      </div>
      <div style="font-size:12px;font-weight:600;min-width:20px">${c.n}</div>
    </div>`).join('');

  const topC = d.topClases.map(c=>`
    <div class="access-item">
      <div class="dot" style="background:${catColors[c.categoria]||'var(--success)'}"></div>
      <div style="flex:1">${c.nombre}</div>
      <div style="font-size:11px;font-weight:700;color:var(--accent)">${c.inscriptos} alumnos</div>
    </div>`).join('') || '<div style="padding:14px;color:var(--muted);font-size:13px">Sin datos</div>';

  const venc = d.proximosVenc.map(s=>`
    <div class="access-item"><div class="dot warn"></div><div style="flex:1">${s.nombre} ${s.apellido}</div><div style="font-size:11px;color:var(--muted)">${s.vencimiento}</div></div>`
  ).join('') || '<div style="padding:14px;color:var(--muted);font-size:13px">Sin vencimientos próximos 🎉</div>';

  setContent(`
  <div class="stats-grid">
    <div class="stat-card green"><div class="stat-label">Socios activos</div><div class="stat-value">${d.totalSocios}</div><div class="stat-sub">${d.sociosAlDia} al día</div></div>
    <div class="stat-card ${d.sociosMorosos>0?'red':'green'}"><div class="stat-label">Cuotas vencidas</div><div class="stat-value">${d.sociosMorosos}</div><div class="stat-sub">requieren cobro</div></div>
    <div class="stat-card blue"><div class="stat-label">Clases activas</div><div class="stat-value">${d.totalClases}</div><div class="stat-sub">${d.totalInscr} inscripciones</div></div>
    <div class="stat-card orange"><div class="stat-label">Ingresos del mes</div><div class="stat-value" style="font-size:24px">$${Number(d.ingresosMes).toLocaleString('es-AR')}</div><div class="stat-sub">cobrado este mes</div></div>
  </div>
  <div class="two-col" style="margin-bottom:16px">
    <div class="table-wrap">
      <div class="table-header"><h3>Accesos últimos 7 días</h3></div>
      <div style="padding:16px">${d.accesosSemana.length?`<div class="chart-bar-wrap">${bars}</div><div class="chart-labels">${labels}</div>`:'<div style="color:var(--muted);font-size:13px">Sin datos</div>'}</div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><h3>Clases por categoría</h3></div>
      <div style="padding:16px">${catBars||'<div style="color:var(--muted);font-size:13px">Sin datos</div>'}</div>
    </div>
  </div>
  <div class="two-col">
    <div class="table-wrap">
      <div class="table-header"><h3>🔥 Clases más populares</h3></div>
      ${topC}
    </div>
    <div class="table-wrap">
      <div class="table-header"><h3>⚠️ Vencimientos esta semana</h3></div>
      ${venc}
    </div>
  </div>`);
}

async function renderSocios(buscar='') {

    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

    </div>
    <button class="btn btn-primary" onclick="modalNuevoSocio()">+ Nuevo Socio</button>`);
  const socios = await api('GET',`/socios?buscar=${encodeURIComponent(buscar)}`);

  const rows = socios.map(s => {
    const ok = s.vencimiento && s.vencimiento >= h;
    return `<tr>
      <td><div style="font-weight:600">${s.apellido}, ${s.nombre}</div><div style="font-size:11px;color:var(--muted)">${s.dni||''}</div></td>

      <td style="color:var(--muted);font-size:12px">${s.vencimiento||'—'}</td>
      <td style="color:var(--accent);font-weight:600">${s.clases_inscriptas||0}</td>

        <button class="btn btn-secondary btn-sm" onclick="verQR(${s.id})">QR</button>

  }).join('');
  setContent(`<div class="table-wrap"><div class="table-header"><h3>${socios.length} socios</h3></div>
    <table><thead><tr><th>Socio</th><th>Teléfono</th><th>Cuota</th><th>Vence</th><th>Clases</th><th>Acciones</th></tr></thead>

async function verSocio(id) {
  const s = await api('GET',`/socios/${id}`);
  const ok = s.vencimiento && s.vencimiento >= hoy();
  const cuotasRows = s.cuotas.slice(0,5).map(c=>`<tr><td>${c.fecha_pago?.slice(0,10)}</td><td>${c.plan_nombre||'—'}</td><td>$${Number(c.monto).toLocaleString()}</td><td>${c.fecha_vencimiento}</td></tr>`).join('');
  const inscRows = s.inscripciones.map(i=>`<div class="access-item"><div class="dot" style="background:var(--${i.categoria?.toLowerCase()||'success'})"></div><div style="flex:1">${i.clase_nombre}</div><div style="font-size:11px;color:var(--muted)">${i.dia_semana} ${i.hora_inicio}</div></div>`).join('');
  const mid = openModal(`${s.apellido}, ${s.nombre}`,`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="color:var(--muted);font-size:11px;margin-bottom:10px">DATOS</div>
        <div style="display:grid;gap:6px;font-size:13px">
          <div><span style="color:var(--muted)">DNI: </span>${s.dni||'—'}</div>
          <div><span style="color:var(--muted)">Tel: </span>${s.telefono||'—'}</div>
          <div><span style="color:var(--muted)">Email: </span>${s.email||'—'}</div>
          <div><span style="color:var(--muted)">Alta: </span>${s.fecha_alta?.slice(0,10)}</div>
        </div>
        <div style="margin-top:12px"><span class="${ok?'cuota-status cuota-ok':'cuota-status cuota-venc'}">${ok?'✅ Cuota al día':'❌ Cuota vencida'}</span>${s.vencimiento?`<div style="font-size:11px;color:var(--muted);margin-top:4px">Vence: ${s.vencimiento}</div>`:''}</div>
        <div style="margin-top:14px;color:var(--muted);font-size:11px;margin-bottom:8px">CLASES INSCRIPTAS</div>
        <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">${inscRows||'<div style="padding:10px;color:var(--muted);font-size:12px">Sin inscripciones</div>'}</div>
      </div>
      <div>
        <div style="color:var(--muted);font-size:11px;margin-bottom:10px">ÚLTIMAS CUOTAS</div>
        <table style="width:100%;font-size:11px"><thead><tr><th>Fecha</th><th>Plan</th><th>Monto</th><th>Vence</th></tr></thead>
        <tbody>${cuotasRows||'<tr><td colspan="4" style="color:var(--muted);padding:8px">Sin cuotas</td></tr>'}</tbody></table>
      </div>
    </div>`,
    `<button class="btn btn-secondary" onclick="closeModal('${mid}')">Cerrar</button>
     <button class="btn btn-primary" onclick="closeModal('${mid}');modalCobro(${s.id},'${s.nombre} ${s.apellido}')">Cobrar</button>`);
}

function modalNuevoSocio() {
  const mid = openModal('Nuevo Socio',`
    <div class="form-grid">
      <div class="form-group"><label>Nombre *</label><input id="sn-n" type="text"></div>
      <div class="form-group"><label>Apellido *</label><input id="sn-a" type="text"></div>
      <div class="form-group"><label>DNI</label><input id="sn-d" type="text"></div>
      <div class="form-group"><label>Teléfono</label><input id="sn-t" type="text"></div>
      <div class="form-group"><label>Email</label><input id="sn-e" type="email"></div>
      <div class="form-group"><label>Nacimiento</label><input id="sn-f" type="date"></div>
      <div class="form-group full"><label>Notas</label><textarea id="sn-no"></textarea></div>
    </div>`,
    `<button class="btn btn-secondary" onclick="closeModal('${mid}')">Cancelar</button>
     <button class="btn btn-primary" onclick="guardarSocio('${mid}')">Guardar</button>`);
}

async function guardarSocio(mid) {
  const nombre=document.getElementById('sn-n').value, apellido=document.getElementById('sn-a').value;
  if(!nombre||!apellido) return toast('Nombre y apellido requeridos','error');
  try {
    await api('POST','/socios',{nombre,apellido,dni:document.getElementById('sn-d').value,telefono:document.getElementById('sn-t').value,email:document.getElementById('sn-e').value,fecha_nacimiento:document.getElementById('sn-f').value,notas:document.getElementById('sn-no').value});
    closeModal(mid); toast('Socio creado ✅'); renderSocios();
  } catch(e) { toast(e.message,'error'); }
}

async function verQR(id) {
  const d = await api('GET',`/socios/${id}/qr`);
  openModal(`QR — ${d.nombre}`,`
    <div style="text-align:center;padding:8px">
      <div class="qr-card"><img src="${d.qr}"><p>${d.nombre}</p></div>
      <div style="margin-top:12px;color:var(--muted);font-size:12px">Imprimí y entregá al socio para el acceso</div>
      <div style="margin-top:12px"><a href="${d.qr}" download="QR-${d.nombre.replace(/ /g,'-')}.png" class="btn btn-primary">⬇ Descargar</a></div>
    </div>`);
}

async function modalCobro(socio_id, nombre) {
  const planes = await api('GET','/planes');
  const opts = planes.map(p=>`<option value="${p.id}" data-precio="${p.precio}" data-tipo="${p.tipo}">${p.nombre} — $${Number(p.precio).toLocaleString()} (${p.tipo})</option>`).join('');
  const mid = openModal(`Cobro — ${nombre}`,`
    <div class="form-grid">
      <div class="form-group full"><label>Plan</label><select id="c-plan" onchange="updMonto()">${opts}</select></div>
      <div class="form-group"><label>Monto ($)</label><input id="c-monto" type="number" step="100"></div>
      <div class="form-group"><label>Método</label>
        <select id="c-met"><option value="efectivo">Efectivo</option><option value="transferencia">Transferencia</option><option value="débito">Débito</option><option value="crédito">Crédito</option></select></div>
      <div class="form-group full"><label>Notas</label><textarea id="c-notas" rows="2"></textarea></div>
    </div>`,
    `<button class="btn btn-secondary" onclick="closeModal('${mid}')">Cancelar</button>
     <button class="btn btn-primary" onclick="guardarCobro(${socio_id},'${mid}')">Registrar Cobro</button>`);
  setTimeout(() => {
    window.updMonto = () => {
      const sel = document.getElementById('c-plan');
      document.getElementById('c-monto').value = sel.options[sel.selectedIndex]?.dataset?.precio||'';
    };
    updMonto();
  }, 40);
}

async function guardarCobro(socio_id, mid) {
  const plan_id = document.getElementById('c-plan').value;
  const monto = document.getElementById('c-monto').value;
  const metodo_pago = document.getElementById('c-met').value;
  const notas = document.getElementById('c-notas').value;
  if (!plan_id || !monto) return toast('Completá plan y monto','error');
  try {
    const r = await api('POST','/cuotas',{socio_id, plan_id, monto, metodo_pago, notas});
    closeModal(mid); toast(`✅ Cobro registrado · Vence: ${r.fecha_vencimiento}`);
    renderSocios();
  } catch(e) { toast(e.message,'error'); }
}

      <div style="width:90px">${catBadge(c.categoria)}</div>

        <button class="btn btn-secondary btn-sm" onclick="verClase(${c.id})">Ver</button>
        <button class="btn btn-secondary btn-sm" onclick="modalEditarClase(${c.id})">Editar</button>

function renderScanner() {
  setContent(`<div style="max-width:460px;margin:0 auto">
    <div class="scanner-area" onclick="document.getElementById('qr-file').click()">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" style="margin:0 auto 10px;display:block"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10"/></svg>
      <div style="font-size:14px;font-weight:600;margin-bottom:3px">Escanear QR del alumno</div>
      <div style="color:var(--muted);font-size:12px">Clic para usar cámara o cargar imagen</div>
    </div>
    <input type="file" id="qr-file" accept="image/*" capture="environment" style="display:none" onchange="procQR(event)">
    <div style="margin:16px 0;text-align:center;color:var(--muted);font-size:12px">— o ingresá el ID manualmente —</div>
    <div style="display:flex;gap:8px">
      <input type="number" id="man-id" placeholder="ID del socio" style="flex:1">
      <button class="btn btn-primary" onclick="accManual()">Registrar</button>
    </div>
    <div id="scan-res"></div>
  </div>`);
}

async function procQR(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const img = new Image();
  img.onload = async () => {
    const c = document.createElement('canvas'); c.width=img.width; c.height=img.height;
    c.getContext('2d').drawImage(img,0,0);
    if (window.jsQR) {
      const code = jsQR(c.getContext('2d').getImageData(0,0,c.width,c.height).data,c.width,c.height);
      code ? await verificarQR(code.data) : showScanResult(false,'No se pudo leer el QR');
    }
  };
  img.src = URL.createObjectURL(file);
}

async function accManual() {
  const id = document.getElementById('man-id').value;
  if (!id) return;
  await verificarQR(JSON.stringify({id:parseInt(id)}));
}

async function verificarQR(qr_data) {
  try {
    const r = await api('POST','/socios/verificar-qr',{qr_data});
    showScanResult(r.alDia, r.mensaje, r.socio, r.vencimiento);
  } catch(e) { showScanResult(false, e.message); }
}

function showScanResult(ok, msg, socio, venc) {
  const cls = ok?'ok':(msg?.includes('vencida')?'warn':'fail');
  document.getElementById('scan-res').innerHTML = `
    <div class="scan-result ${cls}" style="margin-top:16px">
      <div style="font-size:24px">${ok?'✅':(cls==='warn'?'⚠️':'❌')}</div>
      <div style="font-weight:600;margin-top:5px;font-size:14px">${msg}</div>
      ${socio?`<div style="margin-top:6px;font-size:12px;opacity:.8">${socio.nombre} ${socio.apellido}${venc?' · Vence: '+venc:''}</div>`:''}
    </div>`;
}

async function renderMisClases() {
  // Info del socio (usamos socio_id del usuario)
  const socioInfo = await getSocioInfo();
  const inscripciones = await api('GET','/inscripciones');

  const h = hoy();
  const alDia = socioInfo?.vencimiento && socioInfo.vencimiento >= h;

  const clasesPorDia = {};
  const dias = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  inscripciones.forEach(i => {
    if (!clasesPorDia[i.dia_semana]) clasesPorDia[i.dia_semana] = [];
    clasesPorDia[i.dia_semana].push(i);
  });

  const agenda = dias.filter(d=>clasesPorDia[d]).map(dia=>`
    <div style="margin-bottom:14px">
      <div style="font-family:'Bebas Neue';font-size:16px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;padding:0 2px">${dia.toUpperCase()}</div>
      ${clasesPorDia[dia].map(i=>`
        <div class="mi-clase-item">
          <div class="mi-clase-dot ${i.categoria}"></div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${i.clase_nombre}</div>
            <div style="font-size:11px;color:var(--muted)">${i.instructor||''} · ${i.hora_inicio}–${i.hora_fin}</div>
          </div>
          <span class="badge badge-${i.categoria.toLowerCase()}" style="margin-right:8px">${i.categoria}</span>
          <button class="btn btn-danger btn-sm" onclick="cancelarInscripcion(${i.id})">Salir</button>
        </div>`).join('')}
    </div>`).join('');

  setContent(`
    <div class="alumno-hero">
      <div class="alumno-avatar">${currentUser.nombre[0]}</div>
      <div class="alumno-estado">
        <h2>${currentUser.nombre}</h2>
        <div>
          <span class="${alDia?'cuota-status cuota-ok':'cuota-status cuota-venc'}">${alDia?'✅ Cuota al día':'❌ Cuota vencida'}</span>
          ${socioInfo?.vencimiento?`<span style="font-size:11px;color:var(--muted);margin-left:8px">Vence: ${socioInfo.vencimiento}</span>`:''}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'Bebas Neue';font-size:32px;color:var(--accent)">${inscripciones.length}</div>
        <div style="font-size:11px;color:var(--muted)">clases inscriptas</div>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><h3>Mi agenda semanal</h3><button class="btn btn-primary btn-sm" onclick="navigate('explorar')">+ Agregar clase</button></div>
      ${inscripciones.length ? `<div style="padding:14px 16px">${agenda}</div>` : '<div style="padding:40px;text-align:center;color:var(--muted)">No estás inscripto en ninguna clase todavía.<br><br><button class="btn btn-primary" onclick="navigate(\'explorar\')">Explorar clases disponibles</button></div>'}
    </div>`);
}

async function getSocioInfo() {
  if (!currentUser?.socio_id) return null;
  try {
    const socios = await api('GET',`/socios/${currentUser.socio_id}`);
    return socios;
  } catch(e) { return null; }
}

async function cancelarInscripcion(id) {
  if (!confirm('¿Salir de esta clase?')) return;
  await api('DELETE',`/inscripciones/${id}`);
  toast('Te diste de baja de la clase');
  renderMisClases();
}

// ═══════════════════════════════════════════════════════
// ALUMNO — EXPLORAR CLASES
// ═══════════════════════════════════════════════════════
let catFiltro = 'TODAS';
let misInscIds = [];

async function renderExplorar() {
  const [clases, misInsc] = await Promise.all([api('GET','/clases'), api('GET','/inscripciones')]);
  misInscIds = misInsc.map(i=>i.clase_id);
  renderClasesGrid(clases, catFiltro);
}

function renderClasesGrid(clases, filtro='TODAS') {
  catFiltro = filtro;
  const filtradas = filtro==='TODAS' ? clases : clases.filter(c=>c.categoria===filtro);

  const cards = filtradas.map(c => {
    const inscripto = misInscIds.includes(c.id);
    const llena = c.inscriptos >= c.capacidad;
    return `
    <div class="clase-card ${c.categoria}">
      <div class="clase-cat ${c.categoria}">${c.categoria}</div>
      <div class="clase-nombre">${c.nombre}</div>
      <div class="clase-info">
        📅 ${c.dia_semana} · ${c.hora_inicio}–${c.hora_fin}<br>
        👤 ${c.instructor||'—'}<br>
        ${c.descripcion?`💬 ${c.descripcion}`:''}
      </div>
      <div class="clase-footer">
        <span class="clase-spots ${llena?'llena':''}">${llena?'🔴 Completa':`${c.capacidad-c.inscriptos} lugares disponibles`}</span>
        ${inscripto
          ? '<span class="badge badge-green">✓ Inscripto</span>'
          : llena
            ? '<button class="btn btn-secondary btn-sm" disabled>Completa</button>'
            : `<button class="btn btn-primary btn-sm" onclick="inscribirme(${c.id})">Anotarme</button>`}
      </div>
    </div>`;
  }).join('');

  setContent(`
    <div class="cat-filter">
      ${['TODAS','COMBATE','FITNESS','PERSONAL'].map(cat=>`
        <button class="cat-btn ${cat!=='TODAS'?cat:''} ${catFiltro===cat?'active':''}" onclick="cambiarFiltro('${cat}')">${cat}</button>`).join('')}
    </div>
    <div class="clases-grid">${cards||`<div style="color:var(--muted);padding:40px;grid-column:1/-1;text-align:center">Sin clases disponibles en esta categoría</div>`}</div>`);
}

async function cambiarFiltro(cat) {
  const clases = await api('GET','/clases');
  renderClasesGrid(clases, cat);
}

async function inscribirme(clase_id) {
  if (!currentUser?.socio_id) return toast('Tu usuario no tiene socio vinculado','error');
  try {
    await api('POST','/inscripciones',{clase_id, socio_id: currentUser.socio_id});
    toast('✅ ¡Te inscribiste en la clase!');
    renderExplorar();
  } catch(e) { toast(e.message,'error'); }
}
